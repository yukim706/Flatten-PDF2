# このファイルは「GitHub Actions」というしくみをつかって
# パソコンをじどうではたらかせるためのせっていです

name: PDF処理アクション（完全自動）

on:
  workflow_dispatch:  # てどうでボタンをおしたときにもうごかせる
  schedule:
    # あさ6じからよる10じまで、2じかんごとにじどうでうごく
    # （JST）6:00 8:00 10:00 12:00 14:00 16:00 18:00 20:00 22:00
    - cron: '0 21,23,1,3,5,7,9,11,13 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ① GitHubにあるファイルをパソコンにもってくる
      - uses: actions/checkout@v4

      # ② Pythonというプログラムをつかえるようにする
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ③ Pythonでつかう「どうぐ」をインターネットからいれる
      - run: pip install "pymupdf>=1.23" "gspread>=6.0" google-api-python-client google-auth

      # ④ main.pyというプログラムをうごかす（これがメインのしごと）
      - run: python main.py
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
