name: PDF処理アクション（完全自動）

on:
  workflow_dispatch:

  schedule:
    # 日本時間 6:00〜23:00 を1時間おきに実行
    # GitHub Actions の cron は UTC
    - cron: '0 21-23,0-14 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pymupdf gspread google-api-python-client

      - name: Run PDF processing
        run: python main.py
        env:
          # Spreadsheet ID は直書き（Secret不要）
          SPREADSHEET_ID: 1MO5x_WfB3IUU4RlwlcjZzWUbg-CgQT5Yz68qJWYRfT4

          # 認証情報のみ Secret
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
